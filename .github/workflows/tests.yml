name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # One job per PHP version. Composer picks the newest Laravel + Testbench
        # that fits each PHP, so this naturally covers Laravel 10 (on 8.1) through
        # Laravel 13 (on 8.3/8.4) using patched releases only.
        php: ['8.1', '8.2', '8.3', '8.4']

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, sqlite3, pdo_sqlite, mbstring
          coverage: none

      - name: Install dependencies
        run: |
          # Laravel 10 is EOL and every release carries a security advisory, which
          # Composer 2.10 blocks by default. We still support and test on it, so
          # opt out of the block for the test run.
          composer config policy.advisories.block false
          composer update --prefer-dist --prefer-stable --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
